name: Publish UIGraph SDK

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '.github/workflows/ci-cd.yml'

  release:
    types:
      - published

  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1
  AWS_DOMAIN: uigraph
  AWS_DOMAIN_OWNER: 120516861714
  AWS_DOMAIN_OWNER_PROD: 351352952121
  AWS_REPO: npm-sdk

jobs:
  publish_dev:
    name: Build and Publish to CodeArtifact (dev)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to CodeArtifact
        id: login
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --region $AWS_REGION \
            --domain $AWS_DOMAIN \
            --domain-owner $AWS_DOMAIN_OWNER \
            --query authorizationToken --output text)

          npm config set @uigraph:registry=https://$AWS_DOMAIN-$AWS_DOMAIN_OWNER.d.codeartifact.$AWS_REGION.amazonaws.com/npm/$AWS_REPO/
          npm config set //${AWS_DOMAIN}-${AWS_DOMAIN_OWNER}.d.codeartifact.${AWS_REGION}.amazonaws.com/npm/$AWS_REPO/:_authToken=$TOKEN

      - name: Bump version (rollover at 20)
        id: bump_version
        run: |
          node -e "
          const fs = require('fs');
          const pkgPath = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(pkgPath));
          const [major, minor, patch] = (pkg.version || '0.0.0').split('.').map(Number);
          let newMajor = major;
          let newMinor = minor;
          let newPatch = patch + 1;
          if (newPatch > 20) { newPatch = 0; newMinor += 1; }
          if (newMinor > 20) { newMinor = 1; newMajor += 1; }
          const newVersion = [newMajor, newMinor, newPatch].join('.');
          console.log('Current version:', pkg.version);
          console.log('New version:', newVersion);
          pkg.version = newVersion;
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build package
        run: npm run build

      - name: Commit version bump
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(release): bump @uigraph/sdk version [skip ci]'
          file_pattern: 'package.json'

      - name: Publish to CodeArtifact (dev)
        run: npm publish --access public --registry https://$AWS_DOMAIN-$AWS_DOMAIN_OWNER.d.codeartifact.$AWS_REGION.amazonaws.com/npm/$AWS_REPO/

  publish_prod:
    name: Build and Publish to CodeArtifact (prod)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'release' && github.event.action == 'published' && github.event.release.target_commitish == 'main') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm install

      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to CodeArtifact (prod)
        id: login
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --region $AWS_REGION \
            --domain $AWS_DOMAIN \
            --domain-owner $AWS_DOMAIN_OWNER_PROD \
            --query authorizationToken --output text)

          npm config set @uigraph:registry=https://$AWS_DOMAIN-$AWS_DOMAIN_OWNER_PROD.d.codeartifact.$AWS_REGION.amazonaws.com/npm/$AWS_REPO/
          npm config set //${AWS_DOMAIN}-${AWS_DOMAIN_OWNER_PROD}.d.codeartifact.${AWS_REGION}.amazonaws.com/npm/$AWS_REPO/:_authToken=$TOKEN

      - name: Build package
        run: npm run build

      - name: Publish to CodeArtifact (prod)
        run: npm publish --access public --registry https://$AWS_DOMAIN-$AWS_DOMAIN_OWNER_PROD.d.codeartifact.$AWS_REGION.amazonaws.com/npm/$AWS_REPO/
